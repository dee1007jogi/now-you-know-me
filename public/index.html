<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/mobile.css">
    <title>Now You Know Me – Join</title>
    <style>
        /* Scoped Join Screen Animations */
        .join-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo-badge {
            display: inline-block;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1), inset 0 -4px 10px rgba(0, 0, 0, 0.05);
            border: 4px solid var(--accent-blue);
            margin-bottom: 16px;
            animation: spin-badge 10s linear infinite;
            position: relative;
        }

        .logo-badge::after {
            content: "🔍";
            font-size: 2.5rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: counter-spin 10s linear infinite;
        }

        @keyframes spin-badge {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes counter-spin {
            100% {
                transform: translate(-50%, -50%) rotate(-360deg);
            }
        }

        .glow-input {
            font-size: 1.25rem !important;
            text-align: left !important;
            padding: 16px 20px !important;
            border-radius: 12px !important;
            font-weight: 800 !important;
            color: white !important;
            background: rgba(2, 10, 30, 0.7) !important;
            margin-bottom: 0px;
            border: 2px solid #0ea5e9 !important;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.5), inset 0 0 10px rgba(14, 165, 233, 0.3) !important;
            transition: all 0.3s;
        }

        .glow-input:focus {
            outline: none;
            background: rgba(2, 10, 30, 0.9) !important;
            border-color: #38bdf8 !important;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.8), inset 0 0 15px rgba(56, 189, 248, 0.5) !important;
        }

        .glow-input::placeholder {
            color: #94a3b8;
            font-weight: 800;
        }

        .btn-gradient {
            background: linear-gradient(135deg, #f97316, #facc15) !important;
            box-shadow: 0 0 20px rgba(250, 204, 21, 0.6), inset 0 -4px 0 rgba(0, 0, 0, 0.2) !important;
            border: 2px solid #fef08a !important;
            color: white !important;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3) !important;
            text-transform: none !important;
            border-radius: 16px !important;
        }

        .btn-gradient:active {
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.6), inset 0 4px 0 rgba(0, 0, 0, 0.2) !important;
        }

        .owl-host {
            display: inline-block;
            font-size: 4rem;
            filter: drop-shadow(0 15px 15px rgba(0, 0, 0, 0.15));
            animation: float 4s ease-in-out infinite, wave 5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes wave {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            25% {
                transform: translateY(-10px) rotate(-10deg);
            }

            75% {
                transform: translateY(-5px) rotate(10deg);
            }
        }

        /* Unified Selfie Phase Styles */
        .selfie-frame-container {
            position: relative;
            width: 320px;
            height: 520px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 45px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), inset 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .heart-mask {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 35%, rgba(0, 0, 0, 0.4) 80%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .heart-glow {
            width: 220px;
            height: 220px;
            filter: drop-shadow(0 0 25px rgba(56, 189, 248, 0.8));
            animation: heart-pulse 2s ease-in-out infinite;
        }

        @keyframes heart-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.7;
            }

            50% {
                transform: scale(1.08);
                opacity: 1;
            }
        }

        /* Focus Brackets */
        .focus-bracket {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 4px solid #38bdf8;
            z-index: 20;
            filter: drop-shadow(0 0 10px #38bdf8);
        }

        .bracket-tl {
            top: 120px;
            left: 40px;
            border-right: 0;
            border-bottom: 0;
        }

        .bracket-tr {
            top: 120px;
            right: 40px;
            border-left: 0;
            border-bottom: 0;
        }

        .bracket-bl {
            bottom: 120px;
            left: 40px;
            border-right: 0;
            border-top: 0;
        }

        .bracket-br {
            bottom: 120px;
            right: 40px;
            border-left: 0;
            border-top: 0;
        }

        .capture-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, #f97316 0%, #ea580c 70%, #9a3412 100%);
            border: 6px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(234, 88, 12, 0.5), inset 0 0 15px rgba(255, 255, 255, 0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        /* Aperture effect */
        .capture-btn::after {
            content: "";
            position: absolute;
            inset: 10px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .capture-btn:hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .capture-btn:active {
            transform: scale(0.9);
        }

        /* Mobile Adjustments */
</style>
</head>

<body>
    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.18.0/build/cannon.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
    <script src="/mobile3d.js"></script>
    <script src="/engine3d.js"></script>
    <script src="/lipsync.js"></script>

    <!-- CINEMATIC DIALOGUE – speech bubble above character head -->
    <div id="speechBubble" style="
        display:none;
        position:fixed;
        z-index:4000;
        pointer-events:none;
        transform: translate(-50%, -100%);
        max-width: 340px;
        min-width: 220px;
        background: rgba(10,18,40,0.97);
        border: 2px solid #0ea5e9;
        border-radius: 18px;
        padding: 14px 20px;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7), inset 0 0 12px rgba(14,165,233,0.25);
        opacity: 0;
    ">
        <div id="sbName"
            style="color:#facc15; font-weight:900; font-size:0.85rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:6px;">
            Name</div>
        <div id="sbText" style="font-size:1.05rem; font-weight:600; line-height:1.5;">Text</div>
        <!-- downward arrow -->
        <div id="sbArrow" style="
            position:absolute;
            bottom:-18px;
            left:50%;
            transform:translateX(-50%);
            width:0; height:0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 18px solid #0ea5e9;
        "></div>
        <div style="
            position:absolute;
            bottom:-14px;
            left:50%;
            transform:translateX(-50%);
            width:0; height:0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 16px solid rgba(10,18,40,0.97);
        "></div>
    </div>

    <div id="webgl-container" style="position:fixed; inset:0; z-index:-1; pointer-events:none;"></div>

    <!-- ENTRANCE VIDEO OVERLAY -->
    <div id="videoContainer"
        style="position:fixed; inset:0; z-index: 3000; background:black; transition: opacity 1s ease;">
        <video id="entranceVideo" src="/assets/enternce.mp4" autoplay muted playsinline
            style="width:100%; height:100%; object-fit:cover;"></video>
        <button id="skipVideoBtn" class="skip-btn" style="position:absolute; top:24px; right:24px; z-index:3010;">Skip
            ⏭</button>
    </div>

    <!-- REAL JOIN SCREEN -->
    <div id="joinScreen"
        style="display:none; opacity:0; transition: opacity 0.8s ease-in, transform 0.8s ease-out; position: absolute; inset:0; z-index:10; padding-left: 10vw; align-items: center; justify-content: flex-start;">

        <div class="login-panel" style="width: 100%; max-width: 450px; position:relative; z-index: 20;">
            <div class="logo-text-container" style="text-align: center; margin-bottom: 40px; position: relative;">
                <div style="font-size: 3.5rem; font-weight: 900; line-height: 0.9; text-transform: uppercase;">
                    <span style="color: #fef08a; text-shadow: 0 0 10px rgba(254, 240, 138, 0.8), 2px 2px 0 #ca8a04;">NOW
                        YOU</span><br />
                    <span style="color: white; text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 2px 2px 0 #ca8a04;">KNOW
                        ME</span>
                </div>
                <div
                    style="position:absolute; top:-10px; left:10%; font-size:1.5rem; animation: float 3s infinite reverse;">
                    ✨</div>
                <div style="position:absolute; bottom:10px; right:5%; font-size:1.5rem; animation: float 4s infinite;">
                    🌟</div>
                <div style="position:absolute; top:40px; right:15%; font-size:1rem; animation: pulse-glow 2s infinite;">
                    ✦</div>
            </div>

            <input id="name" class="glow-input neon-border" type="text" placeholder="Your name" autofocus
                autocomplete="off" />

            <div style="height: 16px;"></div>
            <button id="joinBtn" class="btn btn-gradient shine-effect"
                style="margin-top: 24px; opacity: 0; pointer-events: none; transform: translateY(20px);">Join the
                Mystery!</button>



            <div id="msg" class="msg" style="margin-top:16px;"></div>
        </div>
    </div>

    <!-- SELFIE CAPTURE SCREEN -->
    <div id="selfieScreen"
        style="display:none; opacity:0; position:fixed; inset:0; z-index:100; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.15);">
        <div class="selfie-header" style="text-align:center; margin-bottom:30px;">
            <h1
                style="font-size:3.5rem; font-weight:900; color:#fef08a; text-shadow: 0 4px 10px rgba(0,0,0,0.5), 0 0 20px rgba(254, 240, 138, 0.4); margin:0; font-family: 'Segoe UI', sans-serif;">
                Snap Your Best Selfie!</h1>
            <p style="color:white; font-size:1.4rem; font-weight:600; opacity:0.9; margin-top: 10px;">Ready for the
                team? Let's capture that spark!</p>
        </div>

        <div class="selfie-frame-container">
            <!-- Focus Brackets -->
            <div class="focus-bracket bracket-tl"></div>
            <div class="focus-bracket bracket-tr"></div>
            <div class="focus-bracket bracket-bl"></div>
            <div class="focus-bracket bracket-br"></div>

            <video id="selfieVideo" autoplay playsinline
                style="width:100%; height:100%; object-fit:cover; filter: contrast(1.1) brightness(1.1);"></video>
            <canvas id="selfieCanvas" style="display:none; width:100%; height:100%; object-fit:cover;"></canvas>
            <div class="heart-mask">
                <svg class="heart-glow" viewBox="0 0 32 29.6">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z" fill="none" stroke="#38bdf8" stroke-width="2" />
                </svg>
            </div>
        </div>

        <div class="selfie-controls"
            style="margin-top:40px; display:flex; align-items:center; justify-content:center; gap:30px; width:100%; max-width:400px;">
            <div id="captureGroup" style="display:flex; align-items:center; gap:30px;">
                <div style="width:60px;"></div> <!-- Spacer -->
                <button id="shutterBtn" class="capture-btn" title="Capture!"></button>
                <div id="galleryBtn" class="btn"
                    style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:white; padding:10px; border-radius:50%; width:60px; height:60px; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer;">
                    📁</div>
            </div>
            <div id="confirmGroup" style="display:none; gap:20px;">
                <button id="retakeBtn" class="btn"
                    style="background:rgba(255,255,255,0.1); border:2px solid white; color:white; padding:12px 30px; border-radius:12px; font-weight:800;">Retake</button>
                <button id="useBtn" class="btn btn-gradient"
                    style="padding:12px 40px; border-radius:12px; font-weight:800;">Use this!</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize WebGL Engine safely
        let engine;
        try {
            engine = new WebGLEngine("webgl-container");
        } catch (e) {
            console.warn("WebGL not supported or error:", e);
        }

        // Add Interactive GSAP Hovers to HTML Elements
        function addGSAPUI(selector) {
            if (!window.gsap) return;
            document.querySelectorAll(selector).forEach(el => {
                el.addEventListener("mouseenter", () => gsap.to(el, { scale: 1.05, duration: 0.3, ease: "elastic.out(1, 0.3)" }));
                el.addEventListener("mouseleave", () => gsap.to(el, { scale: 1, duration: 0.3, ease: "power2.out" }));
                el.addEventListener("mousedown", () => gsap.to(el, { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 }));
            });
        }

        // ENTRANCE VIDEO & LOGIC
        const videoContainer = document.getElementById("videoContainer");
        const entranceVideo = document.getElementById("entranceVideo");
        const skipBtn = document.getElementById("skipVideoBtn");
        const joinScreen = document.getElementById("joinScreen");

        let hasSkipped = false;

        function showJoinScreen() {
            if (hasSkipped) return;
            hasSkipped = true;

            videoContainer.style.opacity = "0";
            setTimeout(() => {
                videoContainer.style.display = "none";
                entranceVideo.pause();
                entranceVideo.src = "";

                joinScreen.style.display = "flex";
                setTimeout(() => {
                    joinScreen.style.opacity = "1";
                    joinScreen.style.transform = "scale(1)";
                }, 50);
                document.getElementById("name").focus();
                addGSAPUI(".btn");
            }, 800);
        }

        skipBtn.onclick = showJoinScreen;
        entranceVideo.onended = showJoinScreen;

        // Ensure video plays
        entranceVideo.play().catch(e => {
            console.log("Autoplay blocked, showing join screen");
            showJoinScreen();
        });

        // Create and style tooltip globally
        const tooltip = document.createElement("div");
        tooltip.innerHTML = "Enter your name!";
        tooltip.style.position = "absolute";
        tooltip.style.padding = "10px 20px";
        tooltip.style.background = "rgba(15, 23, 42, 0.95)";
        tooltip.style.border = "2px solid #38bdf8";
        tooltip.style.boxShadow = "0 8px 25px rgba(56, 189, 248, 0.5)";
        tooltip.style.color = "white";
        tooltip.style.borderRadius = "12px";
        tooltip.style.fontWeight = "800";
        tooltip.style.fontSize = "1.2rem";
        tooltip.style.pointerEvents = "none";
        tooltip.style.opacity = "0";
        tooltip.style.transition = "transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease";
        tooltip.style.zIndex = "100";
        tooltip.style.transform = "translate(-50%, -120%) scale(0.9)";
        document.getElementById("joinScreen").appendChild(tooltip);

        if (engine && window.gsap) {
            const mascotsData = window.Mobile3D.getLoginMascotData();

            async function loadAllMascots() {
                engine.interactables = [];

                // ──────────────────────────────────────────────────────────────
                // Speech Bubble Helper – positions bubble above the model head
                // ──────────────────────────────────────────────────────────────
                // Speech Bubble Helper
                //   side = 'left'  → bubble to the LEFT, arrow points right ➡
                //   side = 'above' → bubble ABOVE head, arrow points down  ↓
                // ──────────────────────────────────────────────────────────────
                // Speech Bubble Helper
                //   side = 'right' → bubble to the RIGHT, arrow points left ⬅
                //   side = 'above' → bubble ABOVE head, arrow points down  ↓
                // ──────────────────────────────────────────────────────────────
                // SPEECH BUBBLE HELPER - Promoted to window for global access
                window.showDialogue = function (model, name, text, durationS, side = 'right') {
                    return new Promise(resolve => {
                        const bubble = document.getElementById("speechBubble");
                        const arrowEl = document.getElementById("sbArrow");
                        document.getElementById("sbName").textContent = name;
                        document.getElementById("sbText").textContent = text;
                        bubble.style.display = "block";

                        if (side === 'right') {
                            // Bubble sits to the RIGHT of the character, arrow points left
                            bubble.style.transform = "translate(45%, -50%)";
                            arrowEl.style.cssText = [
                                "position:absolute", "top:10%", "left:-16px", "bottom:auto", "right:auto",
                                "transform:translateY(-50%)", "width:0", "height:0",
                                "border-top:10px solid transparent", "border-bottom:10px solid transparent",
                                "border-right:16px solid #0ea5e9"
                            ].join(";") + ";";
                        } else {
                            // Bubble sits ABOVE the head, but shifted RIGHT
                            bubble.style.transform = "translate(-15%, -110%)";
                            arrowEl.style.cssText = [
                                "position:absolute", "bottom:-16px", "left:15%", "top:auto", "right:auto",
                                "transform:translateX(-50%)", "width:0", "height:0",
                                "border-left:12px solid transparent", "border-right:12px solid transparent",
                                "border-top:16px solid #0ea5e9"
                            ].join(";") + ";";
                        }

                        // Y offset in world units above the model root (feet)
                        const diagConf = window.Mobile3D ? window.Mobile3D.getDialogueConfig(side) : { headOffsetY: side === 'above' ? 5.5 : 2.5 };
                        const headOffsetY = diagConf.headOffsetY;

                        let rafId = null;
                        let done = false;

                        function trackHead() {
                            if (done) return;
                            const worldPos = new THREE.Vector3();
                            model.getWorldPosition(worldPos);
                            worldPos.y += headOffsetY;

                            const ndc = worldPos.clone().project(engine.camera);
                            let screenX = (ndc.x * 0.5 + 0.5) * window.innerWidth;
                            let screenY = (1 - (ndc.y * 0.5 + 0.5)) * window.innerHeight;

                            const bubbleW = bubble.offsetWidth || 280;
                            const bubbleH = bubble.offsetHeight || 120;

                            if (side === 'right') {
                                // bubble occupies [screenX + offset, screenX + offset + bubbleW]
                                screenX = Math.max(10, screenX);
                                screenX = Math.min(window.innerWidth - bubbleW - 20, screenX);
                                screenY = Math.max(bubbleH / 2 + 10, Math.min(window.innerHeight - bubbleH / 2 - 10, screenY));
                            } else {
                                screenX = Math.max(bubbleW / 2 + 10, Math.min(window.innerWidth - bubbleW / 2 - 10, screenX));
                                screenY = Math.max(bubbleH + 30, Math.min(window.innerHeight - 20, screenY));
                            }

                            bubble.style.left = screenX + "px";
                            bubble.style.top = screenY + "px";

                            rafId = requestAnimationFrame(trackHead);
                        }

                        trackHead();
                        gsap.to(bubble, { opacity: 1, duration: 0.35, ease: "back.out(1.7)" });

                        setTimeout(() => {
                            gsap.to(bubble, {
                                opacity: 0, duration: 0.3, ease: "power2.in",
                                onComplete: () => {
                                    done = true;
                                    cancelAnimationFrame(rafId);
                                    bubble.style.display = "none";
                                    resolve();
                                }
                            });
                        }, durationS * 1000);
                    });
                }

                // Build the 3D Floor
                const floorGeo = new THREE.PlaneGeometry(200, 200);
                const floorMat = new THREE.MeshStandardMaterial({
                    color: 0x050a11, roughness: 0.15, metalness: 0.4,
                });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.position.set(5, -2.5, 95);
                floor.receiveShadow = true;
                engine.scene.add(floor);

                const gridHelper = new THREE.GridHelper(200, 40, 0x0ea5e9, 0x0ea5e9);
                gridHelper.position.set(5, -2.48, 95);
                gridHelper.material.opacity = 0.15;
                gridHelper.material.transparent = true;
                engine.scene.add(gridHelper);

                // Build Glass Wall 
                const windowGroup = new THREE.Group();
                windowGroup.position.set(5, 5, -5);

                const glassGeo = new THREE.PlaneGeometry(200, 25);
                const glassMat = new THREE.MeshPhysicalMaterial({
                    color: 0x88ccff, transparent: true, opacity: 0.15,
                    roughness: 0.05, transmission: 0.9, thickness: 0.5,
                });
                const glassPane = new THREE.Mesh(glassGeo, glassMat);
                windowGroup.add(glassPane);

                const frameMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.4, metalness: 0.7 });
                const hBeamGeo = new THREE.BoxGeometry(200, 0.4, 0.4);
                [-5, 0, 5, 10].forEach(yPos => {
                    const hBeam = new THREE.Mesh(hBeamGeo, frameMat);
                    hBeam.position.set(0, yPos, 0.1);
                    windowGroup.add(hBeam);
                });
                const vBeamGeo = new THREE.BoxGeometry(0.4, 25, 0.4);
                for (let xPos = -100; xPos <= 100; xPos += 10) {
                    const vBeam = new THREE.Mesh(vBeamGeo, frameMat);
                    vBeam.position.set(xPos, 0, 0.1);
                    windowGroup.add(vBeam);
                }
                engine.scene.add(windowGroup);

                // Build Ceiling
                const ceilGeo = new THREE.PlaneGeometry(200, 200);
                const ceilMat = new THREE.MeshStandardMaterial({ color: 0x01050a });
                const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
                ceiling.rotation.x = Math.PI / 2;
                ceiling.position.set(5, 17.5, 95);
                engine.scene.add(ceiling);

                // Architectural Pillars
                const pillarGeo = new THREE.BoxGeometry(2, 25, 2);
                const pillarMat = new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.3 });
                [-45, -15, 15, 45].forEach(x => {
                    const pill = new THREE.Mesh(pillarGeo, pillarMat);
                    pill.position.set(x, 7.5, -2);
                    engine.scene.add(pill);
                });

                // Hanging Light Bars
                const lightBarGeo = new THREE.BoxGeometry(10, 0.2, 0.2);
                const lightBarMat = new THREE.MeshStandardMaterial({ color: 0x60a5fa, emissive: 0x38bdf8, emissiveIntensity: 2 });
                for (let x = -60; x <= 70; x += 25) {
                    for (let z = 10; z <= 60; z += 20) {
                        const bar = new THREE.Mesh(lightBarGeo, lightBarMat);
                        bar.position.set(x, 17.3, z);
                        engine.scene.add(bar);
                    }
                }

                // Add Interior Furniture (Desks & Monitors)
                function createDesk(x, z) {
                    const group = new THREE.Group();
                    group.position.set(x, -2.5, z); // Aligned to floor

                    // Desk top
                    const deskGeo = new THREE.BoxGeometry(6, 0.2, 3);
                    const deskMat = new THREE.MeshStandardMaterial({ color: 0x1e293b });
                    const top = new THREE.Mesh(deskGeo, deskMat);
                    top.position.y = 5.0; // Sits on 5-unit legs
                    group.add(top);

                    // Legs (Metallic) - NOW 5 UNITS HIGH
                    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 5);
                    const legMat = new THREE.MeshStandardMaterial({ color: 0x94a3b8, metalness: 0.8, roughness: 0.2 });
                    const legPos = [[-2.8, -1.3], [2.8, -1.3], [-2.8, 1.3], [2.8, 1.3]];
                    legPos.forEach(p => {
                        const leg = new THREE.Mesh(legGeo, legMat);
                        leg.position.set(p[0], 2.5, p[1]);
                        group.add(leg);
                    });

                    // Monitor
                    const monGeo = new THREE.BoxGeometry(2, 1.2, 0.1);
                    const monMat = new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x0ea5e9, emissiveIntensity: 0.2 });
                    const mon = new THREE.Mesh(monGeo, monMat);
                    mon.position.set(0, 6.3, -1); // Adjusted for taller desk
                    group.add(mon);
                    engine.scene.add(group);
                }

                // Scatter some desks in the background rows
                for (let x = -50; x <= 60; x += 15) {
                    createDesk(x, 0);
                    // Add second row further back
                    if (Math.abs(x - 5) > 10) createDesk(x, -3);
                }

                // Load models
                const loadModel = (data) => new Promise(resolve => {
                    engine.loadGLTF(data.path, (model) => resolve({ model, data }));
                });
                const loadedAssets = await Promise.all(mascotsData.map(loadModel));

                const mascots = {};
                window._mascots = mascots; // Save globally for phase transitions
                loadedAssets.forEach(({ model, data }) => {
                    mascots[data.name] = { model, data };
                    model.scale.set(data.scale, data.scale, data.scale);
                    model.rotation.y = data.rot || 0;
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.receiveShadow = window.innerWidth > 768; // Optimize shadows on mobile
                            child.castShadow = true;
                            if (child.material) {
                                child.material.roughness = 0.6;
                                child.material.metalness = 0.1;
                                if (child.material.emissive) child.material.emissive.setHex(0x000000);
                            }
                        }
                    });
                    model.position.set(0, -100, 0); // Hide initially
                    engine.scene.add(model);
                });

                const owl = mascots['owl'];
                const bunny = mascots['bunny'];
                const fox = mascots['fox'];

                // --- IMMEDIATE STATE (Skipping Intro Conversation) ---
                owl.model.position.set(owl.data.pos.x, owl.data.pos.y, owl.data.pos.z);
                bunny.model.position.set(bunny.data.pos.x, bunny.data.pos.y, bunny.data.pos.z);
                fox.model.position.set(fox.data.pos.x, fox.data.pos.y, fox.data.pos.z);

                // Show Button Immediately
                const btn = document.getElementById("joinBtn");
                btn.style.pointerEvents = "auto";
                btn.style.opacity = "1";
                btn.style.transform = "translateY(0)";
                gsap.to(btn, { scale: 1.05, duration: 0.8, yoyo: true, repeat: -1 });

                // Button Rises with Sparkles
                btn.style.pointerEvents = "auto";
                gsap.to(btn, {
                    opacity: 1,
                    y: 0,
                    duration: 1.0,
                    ease: "elastic.out(1, 0.5)"
                });
                // Pulse the button
                gsap.to(btn, { scale: 1.05, duration: 0.8, yoyo: true, repeat: -1 });

                // Attach general interactions back
                let tooltipRaf = null;
                loadedAssets.forEach(({ model, data }) => {
                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.userData.onHoverEnter = () => {
                                tooltip.innerHTML = data.tooltipText;
                                tooltip.style.opacity = "1";
                                tooltip.style.transform = "translate(-50%, -120%) scale(1)";

                                const trackHead = () => {
                                    const headPos = new THREE.Vector3();
                                    model.getWorldPosition(headPos);
                                    const ttConf = window.Mobile3D ? window.Mobile3D.getTooltipConfig() : { headOffsetY: 4.5 };
                                    headPos.y += ttConf.headOffsetY;
                                    const ndc = headPos.project(engine.camera);
                                    const x = (ndc.x * 0.5 + 0.5) * window.innerWidth;
                                    const y = (1 - (ndc.y * 0.5 + 0.5)) * window.innerHeight;
                                    tooltip.style.left = x + "px";
                                    tooltip.style.top = y + "px";
                                    tooltipRaf = requestAnimationFrame(trackHead);
                                };
                                trackHead();
                            };
                            child.userData.onHoverLeave = () => {
                                cancelAnimationFrame(tooltipRaf);
                                tooltip.style.opacity = "0";
                                tooltip.style.transform = "translate(-50%, -150%) scale(0.9)";
                            };
                            engine.addInteractable(child, () => {
                                gsap.to(model.position, { y: data.pos.y + 1, duration: 0.3, yoyo: true, repeat: 1 });
                                if (window.lipSyncManager && !window.lipSyncManager.isActive) {
                                    window.lipSyncManager.playAndSync(model, data.audio);
                                }
                            });
                        }
                    });
                });
            }

            // Load all mascots
            loadAllMascots();

            createFloatingParticles();
        }

        function createFloatingParticles() {
            if (!engine) return;
            const geo = new THREE.BufferGeometry();
            const count = 100;
            const positions = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 40;     // x
                positions[i + 1] = (Math.random() - 0.5) * 40;   // y
                positions[i + 2] = (Math.random() - 0.5) * 20 - 10; // z
            }
            geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const mat = new THREE.PointsMaterial({ size: 0.1, color: 0xffffff, transparent: true, opacity: 0.5 });
            const particles = new THREE.Points(geo, mat);
            engine.scene.add(particles);

            if (window.gsap) {
                gsap.to(particles.rotation, { y: Math.PI * 2, duration: 150, repeat: -1, ease: "none" });
            }
        }

        function createConfetti() {
            if (!engine) return;
            const colors = [0xfacc15, 0x38bdf8, 0xf97316, 0xffffff];
            for (let i = 0; i < 150; i++) {
                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.05);
                const mat = new THREE.MeshStandardMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    emissive: 0x000000,
                    roughness: 0.5
                });
                const p = new THREE.Mesh(geo, mat);
                p.position.set(0, 5, 10);
                p.rotation.set(Math.random() * 6, Math.random() * 6, Math.random() * 6);
                engine.scene.add(p);

                gsap.to(p.position, {
                    x: (Math.random() - 0.5) * 20,
                    y: -5,
                    z: 5 + Math.random() * 10,
                    duration: 2 + Math.random() * 2,
                    ease: "power2.out",
                    onComplete: () => engine.scene.remove(p)
                });
                gsap.to(p.rotation, {
                    x: Math.random() * 10,
                    y: Math.random() * 10,
                    duration: 3,
                    ease: "none"
                });
            }
        }

        // SELFIE PHASE LOGIC
        const selfieScreen = document.getElementById("selfieScreen");
        const selfieVideo = document.getElementById("selfieVideo");
        const selfieCanvas = document.getElementById("selfieCanvas");
        const shutterBtn = document.getElementById("shutterBtn");
        const retakeBtn = document.getElementById("retakeBtn");
        const useBtn = document.getElementById("useBtn");
        const captureGroup = document.getElementById("captureGroup");
        const confirmGroup = document.getElementById("confirmGroup");

        let stream = null;

        async function startSelfiePhase(mascots) {
            // 1. Move Original Bunny and Owl out, bring Fox and SELFIE BUNNY to HOST positions
            const { owl, bunny, fox, selfie_bunny } = mascots;
            const mobileConf = window.Mobile3D.getSelfiePhaseConfig();

            // Bunny and Owl exit stage
            gsap.to(bunny.model.position, { x: mobileConf.bunnyExitX, duration: 1.5, ease: "power2.in" });
            gsap.to(owl.model.position, { x: mobileConf.owlExitX, duration: 1.5, ease: "power2.in" });

            // FOX (Left Host)
            gsap.to(fox.model.position, { x: mobileConf.foxX, y: mobileConf.foxY, z: mobileConf.foxZ, duration: 2, ease: "elastic.out(1, 0.5)" });
            gsap.to(fox.model.rotation, { y: 0.8, duration: 1 });
            gsap.to(fox.model.scale, { x: mobileConf.foxScale, y: mobileConf.foxScale, z: mobileConf.foxScale, duration: 1 });

            // SELFIE BUNNY (Right Host) - Taking the Owl's place
            selfie_bunny.model.position.set(mobileConf.selfieBunnyX + 10, -1, 45); // Start from side
            gsap.to(selfie_bunny.model.position, { x: mobileConf.selfieBunnyX, y: mobileConf.selfieBunnyY, z: mobileConf.selfieBunnyZ, duration: 2, ease: "elastic.out(1.1, 0.6)" });
            gsap.to(selfie_bunny.model.rotation, { y: -0.8, duration: 1 });
            gsap.to(selfie_bunny.model.scale, { x: mobileConf.selfieBunnyScale, y: mobileConf.selfieBunnyScale, z: mobileConf.selfieBunnyScale, duration: 1 });

            // 2. Fade in Selfie UI & Pop 3D to front
            document.getElementById("webgl-container").classList.add("selfie-mode");
            selfieScreen.style.display = "flex";
            gsap.to(selfieScreen, { opacity: 1, duration: 1 });

            // 3. Start Camera
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 } });
                selfieVideo.srcObject = stream;
                selfieVideo.play();
            } catch (err) {
                console.error("Camera error:", err);
                alert("Please allow camera access to join the game!");
            }

            // Fox greets, Owl waves
            if (window.lipSyncManager) window.lipSyncManager.playAndSync(fox.model, fox.data.audio);
            showDialogue(fox.model, "🦊 Playful Fox", "Look over here! 📸 Professor Hoot and I are ready when you are!", 4.0, 'right');

            // Subtle hover for owl
            gsap.to(owl.model.position, { y: "+=0.2", duration: 1.5, yoyo: true, repeat: -1, ease: "sine.inOut" });
        }

        shutterBtn.onclick = () => {
            const context = selfieCanvas.getContext("2d");
            selfieCanvas.width = selfieVideo.videoWidth;
            selfieCanvas.height = selfieVideo.videoHeight;
            context.drawImage(selfieVideo, 0, 0, selfieCanvas.width, selfieCanvas.height);

            selfieVideo.style.display = "none";
            selfieCanvas.style.display = "block";
            captureGroup.style.display = "none";
            confirmGroup.style.display = "flex";

            const fox = window._mascots['fox'];
            gsap.to(fox.model.position, { y: fox.data.pos.y + 0.5, duration: 0.2, yoyo: true, repeat: 1 });
            showDialogue(fox.model, "🦊 Playful Fox", "Looking sharp! Is this the one?", 3.0, 'right');
        };

        retakeBtn.onclick = () => {
            selfieVideo.style.display = "block";
            selfieCanvas.style.display = "none";
            captureGroup.style.display = "flex";
            confirmGroup.style.display = "none";
        };

        useBtn.onclick = async () => {
            console.log("Use button clicked!");
            const fox = window._mascots['fox'];
            const playerId = localStorage.getItem("playerId");

            if (!playerId) {
                alert("Session expired. Please refresh.");
                return;
            }

            if (fox && fox.model) {
                gsap.to(fox.model.rotation, { y: Math.PI * 2, duration: 1, ease: "power2.inOut" });
            }

            // Celebration
            createConfetti();
            if (window.showDialogue && fox && fox.model) {
                showDialogue(fox.model, "🦊 Playful Fox", "Perfect! Sending your profile to the cloud... 🚀", 3.0, 'right');
            }

            // 1. Prepare Photo Blob
            console.log("Converting canvas to blob...");
            const blob = await new Promise(resolve => {
                selfieCanvas.toBlob((b) => {
                    if (!b) console.warn("Canvas toBlob returned null!");
                    resolve(b);
                }, 'image/jpeg', 0.85);
            });

            if (!blob) {
                alert("Error capturing photo. Please try Retake.");
                return;
            }

            const formData = new FormData();
            formData.append("playerId", playerId);
            formData.append("photo", blob, "selfie.jpg");

            // 2. Upload
            console.log("Uploading to server...");
            useBtn.innerHTML = "⏳ Uploading...";
            useBtn.style.pointerEvents = "none";

            try {
                const res = await fetch("/api/upload-photo", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    const errorField = await res.json();
                    throw new Error(errorField.error || "Upload failed");
                }

                console.log("Upload successful! Redirecting...");
                if (window.showDialogue && fox && fox.model) {
                    showDialogue(fox.model, "🦊 Playful Fox", "You're all set! Now let's answer some clues... 🔍", 2.5, 'right');
                }

                // 3. Redirect to player page
                setTimeout(() => {
                    if (stream) {
                        try {
                            stream.getTracks().forEach(track => track.stop());
                        } catch (e) { }
                    }
                    window.location.href = "/player";
                }, 1500);

            } catch (err) {
                console.error("Upload error:", err);
                useBtn.innerHTML = "Retry Upload";
                useBtn.style.pointerEvents = "auto";
                if (window.showDialogue && fox && fox.model) {
                    showDialogue(fox.model, "🦊 Playful Fox", "Oops! Connection glitch. Try hitting the button again!", 3.0, 'right');
                }
            }
        };

        document.getElementById("galleryBtn").onclick = () => {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            const context = selfieCanvas.getContext("2d");
                            selfieCanvas.width = img.width;
                            selfieCanvas.height = img.height;
                            context.drawImage(img, 0, 0);

                            selfieVideo.style.display = "none";
                            selfieCanvas.style.display = "block";
                            captureGroup.style.display = "none";
                            confirmGroup.style.display = "flex";
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };
            input.click();
        };

        // REAL JOIN LOGIC UPDATED
        document.getElementById("joinBtn").onclick = async () => {
            const nameInput = document.getElementById("name");
            const name = nameInput.value.trim();
            const msg = document.getElementById("msg");
            if (!name) {
                msg.className = "msg error animate-pop";
                msg.textContent = "Please enter your name!";
                if (window.gsap) gsap.to("#name", { x: 10, duration: 0.1, yoyo: true, repeat: 5 });
                return;
            }

            const btn = document.getElementById("joinBtn");
            const originalText = btn.innerHTML;
            btn.innerHTML = "⏳ Joining...";
            btn.style.pointerEvents = "none";

            try {
                // Perform REAL join to get playerId
                const res = await fetch("/api/join", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Join failed");

                // Save playerId for other pages
                localStorage.setItem("playerId", data.playerId);
                localStorage.setItem("playerName", name);

                // 1. Fade out login panel
                gsap.to(".login-panel", {
                    opacity: 0, y: -20, duration: 0.5, onComplete: () => {
                        document.querySelector(".login-panel").style.display = "none";
                    }
                });

                // 2. Trigger Selfie Phase
                startSelfiePhase(window._mascots);

            } catch (err) {
                console.error(err);
                btn.innerHTML = originalText;
                btn.style.pointerEvents = "auto";
                msg.className = "msg error animate-pop";
                msg.textContent = err.message;
            }
        };

        document.getElementById("name").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("joinBtn").click();
        });
    </script>
</body>

</html>
